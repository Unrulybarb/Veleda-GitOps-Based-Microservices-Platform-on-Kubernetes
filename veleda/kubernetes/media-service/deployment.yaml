apiVersion: apps/v1
kind: Deployment

metadata:
  name: media-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: media-service

  template:
    metadata:
      labels:
        app: media-service

    spec:
      imagePullSecrets:
        - name: gitlab-registry

      containers:
        - name: media-service
          image: registry.gitlab.com/unrulybarb/veleda/media-service:b75b7e8b
          imagePullPolicy: Always
          ports:
            - containerPort: 3000