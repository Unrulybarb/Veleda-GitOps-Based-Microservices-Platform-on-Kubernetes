apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: media-service
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://gitlab.com/Unrulybarb/veleda.git
    targetRevision: main
    path: kubernetes/media-service

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true